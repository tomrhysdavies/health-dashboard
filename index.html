<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Health Dashboard</title>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-6">
            <h1 class="text-2xl font-bold text-gray-800">Health Dashboard</h1>
            
            <div id="stats" class="w-full md:w-1/2">
                </div>

            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm font-medium">Export</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                <button onclick="document.getElementById('importFile').click()" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm font-medium">Import</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">Weight Trend</h2>
                <canvas id="weightChart"></canvas>
                <div class="mt-4 flex gap-2">
                    <input type="number" id="wVal" placeholder="Kg" class="border p-2 rounded-lg w-full">
                    <button onclick="saveWeight()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">Log</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-lg">&larr;</button>
                    <h2 id="monthLabel" class="font-bold text-lg"></h2>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-lg">&rarr;</button>
                </div>
                <div id="calGrid" class="grid grid-cols-7 gap-1 text-center"></div>
                <div class="mt-6 flex gap-2">
                    <button onclick="quickLog('Padel')" class="flex-1 bg-green-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-green-700">Padel</button>
                    <button onclick="quickLog('Gym')" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-blue-700">Gym</button>
                    <button onclick="quickLog('Run')" class="flex-1 bg-orange-500 text-white py-2 rounded-lg text-sm font-bold hover:bg-orange-600">Run</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border col-span-1 md:col-span-2">
                <h2 class="text-lg font-bold mb-4">Recipe Library</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <input id="rName" placeholder="Name" class="border p-2 rounded-lg">
                    <input id="rMethod" placeholder="Instructions" class="border p-2 rounded-lg">
                    <input id="rProt" type="number" placeholder="Protein (g)" class="border p-2 rounded-lg">
                    <button onclick="saveRecipe()" class="bg-purple-600 text-white p-2 rounded-lg font-bold">Add Recipe</button>
                </div>
                <input type="text" id="search" oninput="renderRecipes()" placeholder="Search your recipes..." class="border p-2 w-full mb-4 rounded-lg">
                <div id="recipeGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fitData')) || { weights: [], acts: {}, recipes: [] };
        let currentView = new Date();

        function save() { localStorage.setItem('fitData', JSON.stringify(state)); render(); }

        function render() {
            renderWeightChart();
            renderCalendar();
            renderRecipes();
            renderStats();
        }

        function renderStats() {
            const today = new Date();
            const startOfWeek = new Date(today.setDate(today.getDate() - today.getDay() + 1));
            const count = Object.keys(state.acts).filter(d => new Date(d) >= startOfWeek).length;
            const progress = Math.min((count / 3) * 100, 100);

            document.getElementById('stats').innerHTML = `
                <div class="flex justify-between text-xs font-bold mb-1">
                    <span>Weekly Activity</span>
                    <span>${count} / 3 Days</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                    <div class="bg-green-500 h-full transition-all duration-700 ease-out" style="width: ${progress}%"></div>
                </div>
            `;
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            const [y, m] = [currentView.getFullYear(), currentView.getMonth()];
            document.getElementById('monthLabel').innerText = currentView.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            for (let i = 1; i <= new Date(y, m + 1, 0).getDate(); i++) {
                const key = `${y}-${m}-${i}`;
                const div = document.createElement('div');
                div.className = `p-2 text-sm border rounded-lg cursor-pointer transition ${state.acts[key] ? 'bg-green-500 text-white font-bold' : 'bg-gray-50 hover:bg-gray-100'}`;
                div.innerText = i;
                div.title = state.acts[key] || "No activity";
                div.onclick = () => { const t = prompt("Activity?", state.acts[key] || ""); if(t) { state.acts[key] = t; save(); } };
                grid.appendChild(div);
            }
        }

        // --- Helper Logic ---
        function saveWeight() {
            const v = document.getElementById('wVal').value;
            if(v) { state.weights.push({ d: new Date().toLocaleDateString(), v: v }); save(); }
        }

        function quickLog(type) {
            const key = new Date().getFullYear() + '-' + new Date().getMonth() + '-' + new Date().getDate();
            state.acts[key] = type;
            save();
        }

        function saveRecipe() {
            state.recipes.push({ n: document.getElementById('rName').value, m: document.getElementById('rMethod').value, p: document.getElementById('rProt').value });
            save();
        }

        function changeMonth(delta) { currentView.setMonth(currentView.getMonth() + delta); render(); }

        let chart;
        function renderWeightChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'line', data: { labels: state.weights.map(w => w.d), datasets: [{ label: 'Kg', data: state.weights.map(w => w.v), borderColor: '#2563eb', tension: 0.4 }] } });
        }

        function renderRecipes() {
            const query = document.getElementById('search').value.toLowerCase();
            document.getElementById('recipeGrid').innerHTML = state.recipes.filter(r => r.n.toLowerCase().includes(query)).map(r => `
                <div class="border p-4 rounded-xl bg-white shadow-sm border-purple-100">
                    <h3 class="font-bold text-gray-800">${r.n}</h3>
                    <p class="text-xs text-gray-500 mt-1">${r.m}</p>
                    <p class="text-purple-600 font-bold mt-2">${r.p}g Protein</p>
                </div>`).join('');
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'fitness_backup.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => { state = JSON.parse(event.target.result); save(); };
            reader.readAsText(e.target.files[0]);
        }

        render();
    </script>
</body>
</html>
