<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Health Dashboard</title>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-6">
            <h1 class="text-2xl font-bold text-gray-800">Health Dashboard</h1>
            <div id="stats" class="w-full md:w-1/2"></div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm">Export</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">Daily Protein Tracker</h2>
                <div class="text-center py-4">
                    <p class="text-sm text-gray-500">Current Intake</p>
                    <h1 id="currentProtein" class="text-5xl font-bold text-blue-600">0g</h1>
                    <div id="motivator" class="mt-2 text-green-600 font-bold hidden">🎉 Target Met!</div>
                </div>
                <div class="flex gap-2 mt-4">
                    <input type="number" id="pAdd" placeholder="Add (g)" class="border p-2 rounded-lg w-full">
                    <button onclick="addProtein()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Add</button>
                </div>
                <div class="mt-4">
                    <label class="text-xs text-gray-500">Set Daily Goal (g):</label>
                    <input type="number" id="pGoal" onchange="saveGoal()" class="border p-1 w-20 rounded">
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">30-Day Protein Trend</h2>
                <canvas id="proteinChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fitData')) || { weights: [], acts: {}, proteinLogs: {}, goal: 150 };
        const todayKey = new Date().toISOString().split('T')[0];

        function save() { localStorage.setItem('fitData', JSON.stringify(state)); render(); }

        function render() {
            renderProtein();
            renderChart();
        }

        function renderProtein() {
            const current = state.proteinLogs[todayKey] || 0;
            document.getElementById('currentProtein').innerText = current + "g";
            document.getElementById('pGoal').value = state.goal;
            document.getElementById('motivator').classList.toggle('hidden', current < state.goal);
        }

        function addProtein() {
            const val = parseInt(document.getElementById('pAdd').value);
            if(val) {
                state.proteinLogs[todayKey] = (state.proteinLogs[todayKey] || 0) + val;
                save();
            }
        }

        function saveGoal() { state.goal = document.getElementById('pGoal').value; save(); }

        let chart;
        function renderChart() {
            const ctx = document.getElementById('proteinChart').getContext('2d');
            const last30Days = Object.entries(state.proteinLogs).slice(-30);
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: last30Days.map(x => x[0]),
                    datasets: [{ label: 'Protein (g)', data: last30Days.map(x => x[1]), backgroundColor: '#2563eb' }]
                }
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'fitness_backup.json'; a.click();
        }

        render();
    </script>
</body>
</html>
