<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Health Dashboard</title>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-xl shadow border">
            <h2 class="text-xl font-bold mb-4">Weight Trend</h2>
            <canvas id="weightChart"></canvas>
            <div class="mt-4 flex gap-2">
                <input type="number" id="wVal" placeholder="Kg" class="border p-2 rounded w-20">
                <button onclick="saveWeight()" class="bg-blue-600 text-white px-4 py-2 rounded">Log Weight</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow border">
            <div class="flex justify-between mb-4">
                <button onclick="changeMonth(-1)">Prev</button>
                <h2 id="monthLabel" class="font-bold text-xl"></h2>
                <button onclick="changeMonth(1)">Next</button>
            </div>
            <div id="calGrid" class="grid grid-cols-7 gap-2 text-center"></div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow border col-span-1 md:col-span-2">
            <h2 class="text-xl font-bold mb-4">Recipe Library</h2>
            <div class="grid grid-cols-3 gap-4 mb-4">
                <input id="rName" placeholder="Name" class="border p-2 rounded">
                <input id="rMethod" placeholder="Method" class="border p-2 rounded">
                <input id="rProt" type="number" placeholder="Protein (g)" class="border p-2 rounded">
                <button onclick="saveRecipe()" class="bg-purple-600 text-white p-2 rounded col-span-3">Add Recipe</button>
            </div>
            <div id="recipeGrid" class="grid grid-cols-3 gap-4"></div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fitData')) || { weights: [], acts: {}, recipes: [] };
        let currentView = new Date();

        function render() {
            renderWeightChart();
            renderCalendar();
            renderRecipes();
        }

        // --- CALENDAR LOGIC ---
        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            const year = currentView.getFullYear();
            const month = currentView.getMonth();
            document.getElementById('monthLabel').innerText = currentView.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) {
                const dateKey = `${year}-${month}-${i}`;
                const entry = state.acts[dateKey];
                const div = document.createElement('div');
                div.className = `p-2 border rounded cursor-pointer ${entry ? 'bg-green-500 text-white' : 'bg-gray-100'}`;
                div.innerText = i;
                div.title = entry || "Click to add activity";
                div.onclick = () => {
                    const text = prompt("Activity for day " + i, entry || "");
                    if (text !== null) { state.acts[dateKey] = text; save(); render(); }
                };
                grid.appendChild(div);
            }
        }

        function changeMonth(delta) { currentView.setMonth(currentView.getMonth() + delta); render(); }

        // --- WEIGHT CHART LOGIC ---
        let chart;
        function renderWeightChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: state.weights.map(w => w.date),
                    datasets: [{ label: 'Weight (kg)', data: state.weights.map(w => w.val), borderColor: '#2563eb', tension: 0.3 }]
                }
            });
        }

        function saveWeight() {
            state.weights.push({ date: new Date().toLocaleDateString(), val: document.getElementById('wVal').value });
            save(); render();
        }

        function saveRecipe() {
            state.recipes.push({ n: document.getElementById('rName').value, m: document.getElementById('rMethod').value, p: document.getElementById('rProt').value });
            save(); render();
        }

        function renderRecipes() {
            document.getElementById('recipeGrid').innerHTML = state.recipes.map(r => `
                <div class="border p-4 rounded bg-gray-50">
                    <h3 class="font-bold">${r.n}</h3><p class="text-xs text-gray-500">${r.m}</p>
                    <p class="text-green-600 font-bold">${r.p}g Protein</p>
                </div>`).join('');
        }

        function save() { localStorage.setItem('fitData', JSON.stringify(state)); }
        render();
    </script>
</body>
</html>
