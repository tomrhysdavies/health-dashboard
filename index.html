<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Health Dashboard</title>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">Health Dashboard</h1>
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-gray-200 px-4 py-2 rounded-lg text-sm">Export</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">Weight Trend</h2>
                <canvas id="weightChart"></canvas>
                <div class="mt-4 flex gap-2">
                    <input type="number" id="wVal" placeholder="Kg" class="border p-2 rounded-lg w-full">
                    <button onclick="saveWeight()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Log</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)">&larr;</button>
                    <h2 id="monthLabel" class="font-bold"></h2>
                    <button onclick="changeMonth(1)">&rarr;</button>
                </div>
                <div id="calGrid" class="grid grid-cols-7 gap-1 text-center"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border col-span-1 md:col-span-2">
                <h2 class="text-lg font-bold mb-4">Daily Protein</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                    <div><h1 id="currentProtein" class="text-4xl font-bold text-blue-600">0g</h1><div id="motivator" class="hidden text-green-600 font-bold">🎉 Target Met!</div></div>
                    <div class="flex gap-2"><input type="number" id="pAdd" class="border p-2 rounded-lg w-full"><button onclick="addProtein()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">Add</button></div>
                    <div>Goal (g): <input type="number" id="pGoal" onchange="saveGoal()" class="border p-1 w-20"></div>
                </div>
                <div class="mt-4 h-48"><canvas id="proteinChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fitData')) || { weights: [], acts: {}, proteinLogs: {}, goal: 150 };
        let currentView = new Date();
        const todayKey = new Date().toISOString().split('T')[0];

        function save() { localStorage.setItem('fitData', JSON.stringify(state)); renderAll(); }

        // Independent Renderers
        function renderWeight() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if(window.wChart) window.wChart.destroy();
            window.wChart = new Chart(ctx, { type: 'line', data: { labels: state.weights.map(w => w.d), datasets: [{ label: 'Kg', data: state.weights.map(w => w.v), borderColor: '#2563eb' }] } });
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid'); grid.innerHTML = '';
            const [y, m] = [currentView.getFullYear(), currentView.getMonth()];
            document.getElementById('monthLabel').innerText = currentView.toLocaleString('default', { month: 'long', year: 'numeric' });
            for (let i = 1; i <= new Date(y, m + 1, 0).getDate(); i++) {
                const key = `${y}-${m}-${i}`; const act = state.acts[key];
                const div = document.createElement('div');
                div.className = `p-2 border rounded cursor-pointer ${act ? 'bg-blue-500 text-white' : 'bg-gray-50'}`;
                div.innerText = i;
                div.onclick = () => { if(act && confirm('Remove?')) { delete state.acts[key]; save(); } };
                grid.appendChild(div);
            }
        }

        function renderProtein() {
            const current = state.proteinLogs[todayKey] || 0;
            document.getElementById('currentProtein').innerText = current + "g";
            document.getElementById('pGoal').value = state.goal;
            document.getElementById('motivator').classList.toggle('hidden', current < parseInt(state.goal));
            const ctx = document.getElementById('proteinChart').getContext('2d');
            if(window.pChart) window.pChart.destroy();
            window.pChart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(state.proteinLogs).slice(-30), datasets: [{ label: 'g', data: Object.values(state.proteinLogs).slice(-30) }] } });
        }

        function renderAll() { renderWeight(); renderCalendar(); renderProtein(); }
        
        function addProtein() { const val = parseInt(document.getElementById('pAdd').value); if(!isNaN(val)) { state.proteinLogs[todayKey] = (state.proteinLogs[todayKey] || 0) + val; save(); } }
        function saveGoal() { state.goal = document.getElementById('pGoal').value; save(); }
        function saveWeight() { state.weights.push({ d: new Date().toLocaleDateString(), v: document.getElementById('wVal').value }); save(); }
        function changeMonth(d) { currentView.setMonth(currentView.getMonth() + d); renderCalendar(); }
        function exportData() { const b = new Blob([JSON.stringify(state)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'backup.json'; a.click(); }
        
        renderAll();
    </script>
</body>
</html>
