<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Health Dashboard | Sandbox</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border: 1px solid rgba(229, 231, 235, 0.5); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        button { transition: all 0.2s ease; }
        button:hover { transform: translateY(-1px); }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="card p-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div><h1 class="text-2xl font-bold text-gray-800">Health Dashboard</h1></div>
            <div class="flex bg-gray-100 p-1 rounded-lg border">
                <a href="sandbox.html" class="px-4 py-2 text-xs font-bold rounded-md transition-all bg-white shadow-sm text-emerald-600">Sandbox</a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card p-6">
                <h2 class="text-lg font-bold mb-4">Weight Trend</h2>
                <canvas id="weightChart"></canvas>
                <div class="mt-4 flex gap-2">
                    <input type="number" id="wVal" placeholder="Kg" class="border p-2 rounded-lg w-full">
                    <button onclick="saveWeight()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">Log</button>
                </div>
            </div>

            <div class="card p-6">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-lg">&larr;</button>
                    <h2 id="monthLabel" class="font-bold text-lg"></h2>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-lg">&rarr;</button>
                </div>
                <div id="streakHeatmap" class="flex gap-2 mb-6 justify-center"></div>
                <div id="calGrid" class="grid grid-cols-7 gap-1 text-center"></div>
            </div>

            <div class="card p-6 col-span-1 md:col-span-2">
                <h2 class="text-lg font-bold mb-4">Daily Habits</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="md:col-span-2 flex flex-col justify-center">
                        <label class="text-xs font-bold uppercase text-gray-500 mb-2">Protein (g)</label>
                        <div class="flex gap-2">
                            <input type="number" id="pAdd" placeholder="Add (g)" class="border p-2 rounded-lg w-full">
                            <button onclick="handleHabit('protein')" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Log</button>
                        </div>
                    </div>
                    <div class="flex flex-col justify-center">
                        <label class="text-xs font-bold uppercase text-gray-500 mb-2">Creatine</label>
                        <button onclick="handleHabit('creatine')" id="btn-creatine" class="p-2 border rounded-lg text-sm font-bold text-gray-600">Toggle</button>
                    </div>
                    <div class="flex flex-col justify-center">
                        <label class="text-xs font-bold uppercase text-gray-500 mb-2">Multivitamin</label>
                        <button onclick="handleHabit('vitamins')" id="btn-vitamins" class="p-2 border rounded-lg text-sm font-bold text-gray-600">Toggle</button>
                    </div>
                </div>
                <div class="mt-8"><canvas id="habitChart" class="max-h-64"></canvas></div>
            </div>
        </div>
    </div>

    <div id="activityModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="card p-8 w-full max-w-sm text-center">
            <h2 id="modalTitle" class="text-xl font-bold mb-6">Log Activity</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="logFromModal('Padel')" class="bg-green-500 text-white py-3 rounded-lg font-bold">Padel</button>
                <button onclick="logFromModal('Gym')" class="bg-blue-600 text-white py-3 rounded-lg font-bold">Gym</button>
                <button onclick="logFromModal('Run')" class="bg-orange-500 text-white py-3 rounded-lg font-bold">Run</button>
                <button onclick="logFromModal('Swim')" class="bg-cyan-500 text-white py-3 rounded-lg font-bold">Swim</button>
                <button onclick="logFromModal('Active day')" class="col-span-2 bg-yellow-500 text-white py-3 rounded-lg font-bold">Active day</button>
                <button onclick="logFromModal('Clear')" class="col-span-2 bg-gray-200 text-gray-600 py-2 rounded-lg text-xs font-bold hover:bg-gray-300">Clear Entry</button>
            </div>
            <button onclick="closeModal()" class="mt-6 text-gray-400 font-bold underline text-sm">Cancel</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fitData')) || { weights: [], acts: {}, habits: {} };
        let currentView = new Date();
        const activityColors = { 'Padel': 'bg-green-500', 'Gym': 'bg-blue-600', 'Run': 'bg-orange-500', 'Swim': 'bg-cyan-500', 'Active day': 'bg-yellow-500' };
        const getTodayKey = () => new Date().toISOString().split('T')[0];

        function save() { localStorage.setItem('fitData', JSON.stringify(state)); render(); }
        function render() { renderWeightChart(); renderCalendar(); renderStreakHeatmap(); renderHabitEngine(); }

        // Habit Engine
        function ensureHabitDay(key) { if (!state.habits[key]) state.habits[key] = { protein: 0, creatine: false, vitamins: false }; }
        function handleHabit(type) {
            const key = getTodayKey();
            ensureHabitDay(key);
            if (type === 'protein') {
                const val = parseInt(document.getElementById('pAdd').value);
                if (!isNaN(val)) state.habits[key].protein += val;
                document.getElementById('pAdd').value = '';
            } else {
                state.habits[key][type] = !state.habits[key][type];
            }
            save();
        }

        function renderHabitEngine() {
            const key = getTodayKey();
            ensureHabitDay(key);
            document.getElementById('btn-creatine').className = `p-2 border rounded-lg text-sm font-bold ${state.habits[key].creatine ? 'bg-green-100 border-green-500 text-green-700' : 'text-gray-600'}`;
            document.getElementById('btn-vitamins').className = `p-2 border rounded-lg text-sm font-bold ${state.habits[key].vitamins ? 'bg-green-100 border-green-500 text-green-700' : 'text-gray-600'}`;
            
            const ctx = document.getElementById('habitChart').getContext('2d');
            if (window.hChart) window.hChart.destroy();
            const keys = Object.keys(state.habits).slice(-14);
            window.hChart = new Chart(ctx, { type: 'bar', data: { labels: keys.map(k => k.slice(-5)), datasets: [{ label: 'Protein (g)', data: keys.map(k => state.habits[k].protein), backgroundColor: '#3b82f6' }] }, options: { responsive: true, maintainAspectRatio: false } });
        }

        // Calendar/Weight Logic
        function renderCalendar() { 
            const grid = document.getElementById('calGrid'); if (!grid) return; grid.innerHTML = ''; 
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']; 
            days.forEach(day => { const header = document.createElement('div'); header.className = 'text-xs font-bold text-gray-400 pb-2'; header.innerText = day; grid.appendChild(header); }); 
            const [y, m] = [currentView.getFullYear(), currentView.getMonth()]; 
            document.getElementById('monthLabel').innerText = currentView.toLocaleString('default', { month: 'long', year: 'numeric' }); 
            const firstDay = new Date(y, m, 1).getDay(); const offset = (firstDay === 0) ? 6 : firstDay - 1; 
            for (let i = 0; i < offset; i++) grid.appendChild(document.createElement('div')); 
            for (let i = 1; i <= new Date(y, m + 1, 0).getDate(); i++) { 
                const key = `${y}-${m}-${i}`; const activity = state.acts[key]; 
                const div = document.createElement('div'); 
                div.className = `p-2 text-sm border rounded-lg cursor-pointer transition-colors ${activity ? activityColors[activity] + ' text-white font-bold' : 'bg-gray-50 hover:bg-gray-100'}`; 
                div.innerText = i; div.onclick = () => openModal(key); grid.appendChild(div); 
            } 
        }
        function renderStreakHeatmap() { 
            const container = document.getElementById('streakHeatmap'); if(!container) return; container.innerHTML = ''; 
            const today = new Date(); 
            for (let i = 6; i >= 0; i--) { 
                const date = new Date(); date.setDate(today.getDate() - i); 
                const key = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`; 
                const pixel = document.createElement('div'); 
                pixel.className = `w-8 h-8 border-2 ${!!state.acts[key] ? 'bg-green-500' : 'bg-gray-200'}`; 
                container.appendChild(pixel); 
            } 
        }
        function renderWeightChart() { 
            const ctx = document.getElementById('weightChart').getContext('2d'); if(window.chart) window.chart.destroy(); 
            window.chart = new Chart(ctx, { type: 'line', data: { labels: state.weights.map(w => w.d), datasets: [{ label: 'Weight (kg)', data: state.weights.map(w => w.v), borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.05)', fill: true, tension: 0.4 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 10 } } }, y: { grid: { color: '#f3f4f6' }, ticks: { font: { size: 10 } }, beginAtZero: false } } } }); 
        }
        
        function saveWeight() { const v = document.getElementById('wVal').value; if(v) { state.weights.push({ d: new Date().toLocaleDateString(), v: v }); save(); } }
        function changeMonth(d) { currentView.setMonth(currentView.getMonth() + d); render(); }
        function openModal(key) { selectedDateKey = key; const parts = key.split('-'); document.getElementById('modalTitle').innerText = `Log Activity for ${parts[2]}/${parseInt(parts[1])+1}`; document.getElementById('activityModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('activityModal').classList.add('hidden'); }
        function logFromModal(activity) { if(activity === 'Clear') delete state.acts[selectedDateKey]; else state.acts[selectedDateKey] = activity; save(); closeModal(); }
        
        let selectedDateKey = "";
        render();
    </script>
</body>
</html>
